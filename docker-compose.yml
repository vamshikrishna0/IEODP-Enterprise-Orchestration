version: "3.9"

services:

  app:
    build: .
    container_name: ieodp_app
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: ieodp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ieodp
    ports:
      - "3307:3306"

  redis:
    image: redis:7
    container_name: ieodp_redis
    ports:
      - "6379:6379"

  celery:
    build: .
    container_name: ieodp_celery
    command: celery -A app.workers.celery_worker worker --loglevel=info
    depends_on:
      - redis
      - mysql
